<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300">

  <!-- Icon circle - dark navy -->
  <circle cx="295" cy="150" r="52" fill="#1A1A2E"/>
  <!-- Ring -->
  <circle cx="295" cy="150" r="46" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.35"/>

  <!-- Screen frame inside circle - WHITE -->
  <rect x="268" y="128" width="54" height="38" rx="5" fill="none" stroke="white" stroke-width="2"/>

  <!-- Dot top-left - WHITE -->
  <circle cx="280" cy="138" r="5" fill="white" opacity="0.9"/>

  <!-- Chart line - WHITE -->
  <polyline
    points="270,158 278,150 286,154 296,144 305,148 314,138 320,142"
    fill="none"
    stroke="white"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.7"/>

  <!-- Stand line -->
  <line x1="295" y1="168" x2="295" y2="178" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="283" y1="178" x2="307" y2="178" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Wordmark: Thumb (primary text) -->
  <text x="362" y="168" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="54" letter-spacing="-1" fill="#FFFFFF">Thumb</text>

  <!-- Wordmark: Lab (sky blue accent) -->
  <text x="570" y="168" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="54" letter-spacing="-1" fill="#38BDF8">Lab</text>

  <!-- Tagline -->
  <text x="363" y="192" font-family="Arial, Helvetica, sans-serif" font-weight="300" font-size="11" letter-spacing="3.5" fill="#666666">POWERED BY AI</text>

</svg>
